<!DOCTYPE html>
<html>
    <head>
        <title>Muhammad Haroon</title>
        <link rel="stylesheet" href="https://haroon96.github.io/README-Renderer/stylesheet.css">
        <style>
            body {
                background: #f5f5f5;
            }
            h2 {
                text-align: center;
            }
            ul {
                list-style: none;
                margin: 0;
                padding: 0;
            }
            li .header {
                display: flex;
                align-items: center;
                flex-wrap: wrap;
            }
            li .header > .stats {
                display: flex;
                margin-left: 12px;
            }
            li .header > .stats > span {
                color: #aaa;
                fill: #aaa;
                font-size: 16px;
                display: flex;
                align-items: center;
                margin-left: 6px;
            }
            li .header > .stats > span > svg {
                margin: 2px;
            }
            li .header > span.lang {
                margin-left: auto;
                color: #aaa;
            }
            li > a {
                color: inherit;
                display: block;
                text-decoration: inherit;
                padding: 24px;
                transition: all linear 0.2s;
                border-radius: 16px;
                cursor: pointer;
            }
            li > a:hover {
                background: white;
            }
            li > a:hover * {
                color: black !important;
                fill: black !important;
            }
            h3 {
                margin: 0;
            }
            h4 {
                color: #666;
                font-weight: normal;
                margin: 0;
                margin-top: 12px;
            }
            @media screen and (max-width: 600px) {
                li .header {
                    flex-direction: column;
                    align-items: center;
                }
                li .header > .stats {
                    margin: 0;
                }
                li .header > .stats > span {
                    flex-direction: column;
                }
                li .header > span.lang {
                    margin-left: 0;
                    font-size: 0.8em;
                }
                li {
                    text-align: center;
                }
            }
        </style>
    </head>
    <body>
        <h1>Hello there!</h1>
        <h2>Apologies but my site is currently a work in progress.</h2>
        <h2>Feel free to view my work for now.</h2>
        <ul id="projList">
            <li v-for="p in pList">
                <a :href="getUrl(p)" target='_blank'>
                <div class="header">
                    <h3>{{ p.name }}</h3>
                    <div class="stats">
                        <span v-if="p.forks > 0">
                            <svg height="16" viewBox="0 0 16 16" version="1.1" width="16" aria-hidden="true"><path fill-rule="evenodd" d="M11.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122V6A2.5 2.5 0 0110 8.5H6a1 1 0 00-1 1v1.128a2.251 2.251 0 11-1.5 0V5.372a2.25 2.25 0 111.5 0v1.836A2.492 2.492 0 016 7h4a1 1 0 001-1v-.628A2.25 2.25 0 019.5 3.25zM4.25 12a.75.75 0 100 1.5.75.75 0 000-1.5zM3.5 3.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0z"></path></svg>
                            {{ p.forks }}
                        </span>
                        <span v-if="p.stars > 0">
                            <svg height="16" viewBox="0 0 16 16" version="1.1" width="16" aria-hidden="true"><path fill-rule="evenodd" d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"></path></svg>
                            {{ p.stars }}
                        </span>
                        <span v-if="p.watchers > 0">
                            <svg height="16" viewBox="0 0 16 16" version="1.1" width="16" aria-hidden="true"><path fill-rule="evenodd" d="M1.679 7.932c.412-.621 1.242-1.75 2.366-2.717C5.175 4.242 6.527 3.5 8 3.5c1.473 0 2.824.742 3.955 1.715 1.124.967 1.954 2.096 2.366 2.717a.119.119 0 010 .136c-.412.621-1.242 1.75-2.366 2.717C10.825 11.758 9.473 12.5 8 12.5c-1.473 0-2.824-.742-3.955-1.715C2.92 9.818 2.09 8.69 1.679 8.068a.119.119 0 010-.136zM8 2c-1.981 0-3.67.992-4.933 2.078C1.797 5.169.88 6.423.43 7.1a1.619 1.619 0 000 1.798c.45.678 1.367 1.932 2.637 3.024C4.329 13.008 6.019 14 8 14c1.981 0 3.67-.992 4.933-2.078 1.27-1.091 2.187-2.345 2.637-3.023a1.619 1.619 0 000-1.798c-.45-.678-1.367-1.932-2.637-3.023C11.671 2.992 9.981 2 8 2zm0 8a2 2 0 100-4 2 2 0 000 4z"></path></svg>
                            {{ p.watchers }}
                        </span>
                    </div>
                    <span class="lang">
                        {{ p.language }}
                    </span>
                </div>
                <h4>{{ p.description }}</h4>
                </a>
            </li>
        </ul>
    </body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.6.12/vue.min.js"></script>
    <script>

        new Vue({
            el: '#projList',
            data: {
                pList: []
            },
            created: async function() {
                let res = await fetch('repos.json');
                if (res.ok) {
                    this.pList = await res.json();
                }
            },
            methods: {
                getUrl: u => {
                    if (u.has_pages) {
                        return `https://${u.owner}.github.io/${u.name}`;
                    }
                    return u.url;
                }
            }
        })

    </script>
</html>
