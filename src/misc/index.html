<!DOCTYPE html>
<html>

<head>
  <title>Miscellaneous | Muhammad Haroon</title>
  <!--(bake /src/includes/head.html)-->
  <script> PAGE_NAME = 'misc';</script>
</head>

<body>
  <!--(bake /src/includes/navbar.html)-->
  <section class="section">
    <div class="container is-max-desktop">

      <h1 class="section-title mt-6">Photography</h1>
      <p>You can find a few of my favorite photos that I've taken here.</p>
      <br>

      <div class="photo is-flex is-flex-wrap-wrap is-align-items-start">
        <!--(bake-start _foreach="photo:photos")-->
        <figure class="image is-128x128 mr-1 mt-1">
          <img src="/misc/photos/{{ photo.thumbnail }}" 
            class="js-modal-trigger" 
            data-target="image-modal" 
            data-src="/misc/photos/{{ photo.photo }}"
            data-index="{{photo@index}}"
          >
        </figure>
        <!--(bake-end)-->

      </div>
      <!--(bake-end)-->

      <div id="image-modal" class="modal">
        <div class="modal-background"></div>
        <div class="modal-content">
          <p class="is-flex is-align-items-center is-justify-content-center">
            <span class="photo-previous" aria-label="previous" id="photo-previous">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"><path d="M16.67 0l2.83 2.829-9.339 9.175 9.339 9.167-2.83 2.829-12.17-11.996z"/></svg>            </span>
            <img id="modal-img">
            <span class="photo-next" aria-label="next" id="photo-next">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"><path d="M16.67 0l2.83 2.829-9.339 9.175 9.339 9.167-2.83 2.829-12.17-11.996z"/></svg>            </span>
            </span>
          </p>
        </div>
        <button class="modal-close is-large" aria-label="close"></button>
      </div>

    </div>
  </section>


  <!--(bake /src/includes/footer.html)-->
</body>
  <script>

    document.addEventListener('DOMContentLoaded', () => {

      // build list of images
      const images = document.querySelectorAll('.photo > figure.image img');
      let currentImage;

      // Functions to open and close a modal
      function openModal($el, src) {
        document.getElementById("modal-img").src = src;
        $el.classList.add('is-active');
      }

      function closeModal($el) {
        document.getElementById("modal-img").src = null;
        $el.classList.remove('is-active');
      }

      function closeAllModals() {
        (document.querySelectorAll('.modal') || []).forEach(($modal) => {
          closeModal($modal);
        });
      }

      // Add a click event on buttons to open a specific modal
      (document.querySelectorAll('.js-modal-trigger') || []).forEach(($trigger) => {
        const modal = $trigger.dataset.target;
        const $target = document.getElementById(modal);

        $trigger.addEventListener('click', () => {
          openModal($target, $trigger.dataset.src);
          currentImage = $trigger.dataset.index;
        });
      });

      // Add a click event on various child elements to close the parent modal
      (document.querySelectorAll('.modal-background, .modal-close, .modal-card-head .delete, .modal-card-foot .button') || []).forEach(($close) => {
        const $target = $close.closest('.modal');

        $close.addEventListener('click', () => {
          closeModal($target);
        });
      });

      // Add a keyboard event to close all modals
      document.addEventListener('keydown', (event) => {
        const e = event || window.event;

        if (e.keyCode === 27) { // Escape key
          closeAllModals();
        }
      });

      document.getElementById('photo-previous').addEventListener('click', () => {
        currentImage = parseInt(currentImage) - 1;
        if (currentImage < 0) {
          currentImage = images.length - 1;
        }

        document.getElementById("modal-img").src = images[currentImage].dataset.src;
      });

      document.getElementById('photo-next').addEventListener('click', () => {
        currentImage = parseInt(currentImage) + 1;
        if (currentImage >= images.length) {
          currentImage = 0;
        }

        document.getElementById("modal-img").src = images[currentImage].dataset.src;
      });
    });

  </script>
</html>
