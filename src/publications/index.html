<!DOCTYPE html>
<html>

<head>
  <title>Publications | Muhammad Haroon</title>
  <link rel="stylesheet" href="https://cdn.iconmonstr.com/1.3.0/css/iconmonstr-iconic-font.min.css">
  <!--(bake /src/includes/head.html)-->
  <script> PAGE_NAME = 'publications'; </script>
</head>

<body>
  <!--(bake /src/includes/navbar.html)-->
  <section class="section">
    <div class="container">
      <h1 class="title">Publications</h1>
      <div class="publications">
        <!--(bake-start _foreach="publication:publications")-->
        <div class="publication">
          <h1 class="is-size-5">
            <a target="_blank" href="{{ publication.url }}"><strong>{{ publication.title }}</strong></a>
          </h1>
          <h2>
            <!--(bake-start _foreach="author:publication.authors")-->
              <!--(bake-start _if="author == 'Muhammad Haroon'")-->
              <span><strong>{{ author }}</strong></span>
              <!--(bake-end)-->
              <!--(bake-start _if="author != 'Muhammad Haroon'")-->
              <span>{{ author }}</span>
              <!--(bake-end)-->
            <!--(bake-end)-->
          </h2>
          <h2>
            {{ publication.venue }}, {{ publication.year }}
          </h2>
      </div>
        <!--(bake-end)-->
      </div>
    </div>
  </section>
  <!--(bake /src/includes/footer.html)-->
</body>

</html>
