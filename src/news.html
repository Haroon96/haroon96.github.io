<table class="news">
  <!--(bake-start _foreach="n:news")-->
  <tr>
    <!--(bake-start _if="!(n@index == 0 || news[n@index]['year'] != news[n@index - 1]['year'])")-->
    <td>&nbsp;</td>
    <!--(bake-end)-->
    <!--(bake-start _if="n@index == 0 || news[n@index]['year'] != news[n@index - 1]['year']")-->
    <td class="mt-3">{{ n.year }}</td>
    <!--(bake-end)-->
    <!--(bake-start _if="n@index == 0 || news[n@index]['month'] != news[n@index - 1]['month']")-->
    <td class="pl-1">{{ n.month }}</td>
    <!--(bake-end)-->
    <!--(bake-start _if="n@index > 0 && news[n@index]['month'] == news[n@index - 1]['month']")-->
    <td class="pl-1">&nbsp;</td>
    <!--(bake-end)-->
    <td class="pl-3">{{ n.content }}</td>
  </tr>
  <!--(bake-end)-->
</table>
