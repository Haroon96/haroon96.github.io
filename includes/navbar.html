<script>
    document.addEventListener('DOMContentLoaded', () => {
        // code for the burger menu
        const burger = document.getElementById('navbar-burger');

        burger.addEventListener('click', () => {
            const target = document.getElementById('navbar-menu');
            burger.classList.toggle('is-active');
            target.classList.toggle('is-active');
        });

        try {
            const navbar = document.getElementById('navbar-menu');
            for (const tag of navbar.getElementsByTagName('a')) {
                // highlight the nav button for current page
                if (tag.innerText.toLowerCase().includes(PAGE_NAME)) {
                    tag.classList.add('is-active', 'is-tab');
                }
            }
        } catch (e) { }
    });
</script>
